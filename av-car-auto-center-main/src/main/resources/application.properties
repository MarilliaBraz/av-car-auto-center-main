spring.application.name=auto_center
server.port=4200

# Conexao com o banco PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bd_avCar}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Adapter — Consulta de Placa (configure com o provedor real)
consulta.placa.url=https://api.exemplo.com/placa
consulta.placa.token=token-nao-configurado