<div class="header-row">
  <h2>Ordens de Serviço</h2>
  <button mat-flat-button class="btn-primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Nova Ordem de Serviço
  </button>
</div>

<mat-form-field appearance="outline" class="search-field">
  <mat-label>Buscar</mat-label>
  <input matInput #searchInput (input)="applyFilter(searchInput.value)" placeholder="Digite para filtrar..." />
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<div class="table-container">
  <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef>Nº OS</th>
      <td mat-cell *matCellDef="let row">{{ row.numero ?? 'OS-' + row.id }}</td>
    </ng-container>
    <ng-container matColumnDef="dataAbertura">
      <th mat-header-cell *matHeaderCellDef>Data Abertura</th>
      <td mat-cell *matCellDef="let row">{{ row.dataAbertura | date:'dd/MM/yyyy' }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <app-status-badge [status]="row.status"></app-status-badge>
      </td>
    </ng-container>
    <ng-container matColumnDef="valorTotal">
      <th mat-header-cell *matHeaderCellDef>Valor Total</th>
      <td mat-cell *matCellDef="let row">{{ row.valorTotal | currency:'BRL' }}</td>
    </ng-container>
    <ng-container matColumnDef="idVeiculo">
      <th mat-header-cell *matHeaderCellDef>Veículo</th>
      <td mat-cell *matCellDef="let row">{{ row.placa || row.idVeiculo }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let row">
        <div class="action-buttons">
          <button mat-icon-button class="icon-btn-edit" (click)="openForm(row)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="icon-btn-delete" (click)="delete(row)" matTooltip="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td [colSpan]="displayedColumns.length">
        <div class="empty-state" *ngIf="!loading">
          <mat-icon>inbox</mat-icon>
          <p>Nenhuma ordem de serviço encontrada.</p>
        </div>
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
    showFirstLastButtons
  ></mat-paginator>
</div>
