<div class="header-row">
  <h2>Colaboradores</h2>
  <button mat-flat-button class="btn-primary" (click)="openForm()">
    <mat-icon>add</mat-icon> Novo Colaborador
  </button>
</div>

<mat-form-field appearance="outline" class="search-field">
  <mat-label>Buscar</mat-label>
  <input matInput #searchInput (input)="applyFilter(searchInput.value)" placeholder="Digite para filtrar..." />
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<div class="table-container">
  <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>

  <table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let row">{{ row.nome }}</td>
    </ng-container>
    <ng-container matColumnDef="cpf">
      <th mat-header-cell *matHeaderCellDef>CPF</th>
      <td mat-cell *matCellDef="let row">{{ row.cpf }}</td>
    </ng-container>
    <ng-container matColumnDef="telefone">
      <th mat-header-cell *matHeaderCellDef>Telefone</th>
      <td mat-cell *matCellDef="let row">{{ row.telefone }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>E-mail</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>
    <ng-container matColumnDef="salario">
      <th mat-header-cell *matHeaderCellDef>Salário</th>
      <td mat-cell *matCellDef="let row">{{ row.salario | currency:'BRL' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td mat-cell *matCellDef="let row">
        <div class="action-buttons">
          <button mat-icon-button class="icon-btn-edit" (click)="openForm(row)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="icon-btn-delete" (click)="delete(row)" matTooltip="Excluir">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td [colSpan]="displayedColumns.length">
        <div class="empty-state" *ngIf="!loading">
          <mat-icon>inbox</mat-icon>
          <p>Nenhum colaborador encontrado.</p>
        </div>
      </td>
    </tr>
  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
    showFirstLastButtons
  ></mat-paginator>
</div>
